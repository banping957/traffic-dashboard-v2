<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章管理 - OpenClaw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="articles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- 侧边导航栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i data-lucide="feather" class="logo-icon"></i>
                <span class="logo-text">OpenClaw</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i data-lucide="chevron-left"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <i data-lucide="layout-dashboard"></i>
                        <span class="nav-text">工作台</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="articles.html" class="nav-link">
                        <i data-lucide="file-text"></i>
                        <span class="nav-text">文章管理</span>
                        <span class="nav-badge" id="articleCount">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="materials.html" class="nav-link">
                        <i data-lucide="image"></i>
                        <span class="nav-text">素材库</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="todos.html" class="nav-link">
                        <i data-lucide="check-square"></i>
                        <span class="nav-text">待办事项</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="calendar.html" class="nav-link">
                        <i data-lucide="calendar"></i>
                        <span class="nav-text">发布日历</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">
                    <span>K</span>
                </div>
                <div class="user-details">
                    <span class="user-name">Kimi Claw</span>
                    <span class="user-role">创作者</span>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" title="切换主题">
                <i data-lucide="sun" class="theme-icon-light"></i>
                <i data-lucide="moon" class="theme-icon-dark"></i>
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="page-title">文章管理</h1>
            </div>
            <div class="top-bar-right">
                <button class="btn btn-primary btn-new" id="newArticleBtn">
                    <i data-lucide="plus"></i>
                    <span>新建文章</span>
                </button>
            </div>
        </header>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <!-- 筛选工具栏 -->
            <section class="filter-toolbar">
                <div class="filter-left">
                    <!-- 搜索框 -->
                    <div class="search-box search-large">
                        <i data-lucide="search"></i>
                        <input type="text" placeholder="搜索文章标题、内容..." id="articleSearch">
                        <button class="search-clear" id="clearSearch">
                            <i data-lucide="x"></i>
                        </button>
                    </div>
                    
                    <!-- 筛选器 -->
                    <div class="filter-group">
                        <select class="filter-select" id="typeFilter">
                            <option value="">全部类型</option>
                            <option value="story">人物故事</option>
                            <option value="analysis">专业解读</option>
                        </select>
                        
                        <select class="filter-select" id="statusFilter">
                            <option value="">全部状态</option>
                            <option value="published">已发布</option>
                            <option value="draft">草稿</option>
                        </select>
                        
                        <select class="filter-select" id="dateFilter">
                            <option value="">全部时间</option>
                            <option value="today">今天</option>
                            <option value="week">本周</option>
                            <option value="month">本月</option>
                        </select>
                    </div>
                </div>
                
                <div class="filter-right">
                    <!-- 视图切换 -->
                    <div class="view-toggle" id="viewToggle">
                        <button class="view-btn active" data-view="card" title="卡片视图">
                            <i data-lucide="layout-grid"></i>
                        </button>
                        <button class="view-btn" data-view="list" title="列表视图">
                            <i data-lucide="list"></i>
                        </button>
                    </div>
                </div>
            </section>

            <!-- 批量操作栏 -->
            <section class="batch-toolbar" id="batchToolbar">
                <div class="batch-info">
                    <label class="checkbox-wrapper">
                        <input type="checkbox" id="selectAll">
                        <span class="checkmark"></span>
                    </label>
                    <span class="batch-text">已选择 <strong id="selectedCount">0</strong> 篇文章</span>
                </div>
                <div class="batch-actions">
                    <button class="btn btn-secondary" id="batchPublish">
                        <i data-lucide="upload"></i>
                        <span>批量发布</span>
                    </button>
                    <button class="btn btn-secondary" id="batchDelete">
                        <i data-lucide="trash-2"></i>
                        <span>批量删除</span>
                    </button>
                </div>
            </section>

            <!-- 文章列表 - 卡片视图 -->
            <section class="articles-container card-view" id="articlesContainer">
                <div class="articles-grid" id="articlesGrid">
                    <!-- 文章卡片由 JS 动态加载 -->
                    <div class="loading-state">
                        <i data-lucide="loader-2" class="spin"></i>
                        <span>加载中...</span>
                    </div>
                </div>
            </section>

            <!-- 文章列表 - 列表视图 -->
            <section class="articles-container list-view hidden" id="listViewContainer">
                <div class="articles-table-wrapper">
                    <table class="articles-table">
                        <thead>
                            <tr>
                                <th class="col-checkbox">
                                    <label class="checkbox-wrapper">
                                        <input type="checkbox" id="selectAllList">
                                        <span class="checkmark"></span>
                                    </label>
                                </th>
                                <th class="col-title">标题</th>
                                <th class="col-type">类型</th>
                                <th class="col-date">日期</th>
                                <th class="col-words">字数</th>
                                <th class="col-status">状态</th>
                                <th class="col-actions">操作</th>
                            </tr>
                        </thead>
                        <tbody id="articlesTableBody">
                            <!-- 表格内容由 JS 动态加载 -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- 分页 -->
            <section class="pagination-section">
                <div class="pagination-info">
                    显示 <strong>1-12</strong> 条，共 <strong id="totalArticles">156</strong> 条
                </div>
                <div class="pagination" id="pagination">
                    <!-- 分页由 JS 生成 -->
                </div>
            </section>
        </div>
    </main>

    <!-- 移动端遮罩 -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
    <script src="articles.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
