<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - OpenClaw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- 侧边导航栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i data-lucide="feather" class="logo-icon"></i>
                <span class="logo-text">OpenClaw</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i data-lucide="chevron-left"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item active">
                    <a href="index.html" class="nav-link">
                        <i data-lucide="layout-dashboard"></i>
                        <span class="nav-text">工作台</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="articles.html" class="nav-link">
                        <i data-lucide="file-text"></i>
                        <span class="nav-text">文章管理</span>
                        <span class="nav-badge" id="articleCount">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="materials.html" class="nav-link">
                        <i data-lucide="image"></i>
                        <span class="nav-text">素材库</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="todos.html" class="nav-link">
                        <i data-lucide="check-square"></i>
                        <span class="nav-text">待办事项</span>
                        <span class="nav-badge warning" id="todoCount">0</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="calendar.html" class="nav-link">
                        <i data-lucide="calendar"></i>
                        <span class="nav-text">发布日历</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">
                    <span>K</span>
                </div>
                <div class="user-details">
                    <span class="user-name">Kimi Claw</span>
                    <span class="user-role">创作者</span>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" title="切换主题">
                <i data-lucide="sun" class="theme-icon-light"></i>
                <i data-lucide="moon" class="theme-icon-dark"></i>
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="page-title">工作台</h1>
            </div>
            <div class="top-bar-right">
                <button class="btn btn-primary btn-new" id="newArticleBtn">
                    <i data-lucide="plus"></i>
                    <span>新建文章</span>
                </button>
            </div>
        </header>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <!-- 统计卡片 -->
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon today">
                            <i data-lucide="file-text"></i>
                        </div>
                        <div class="stat-content">
                            <span class="stat-value" id="todayCount">0</span>
                            <span class="stat-label">今日文章</span>
                        </div>
                        <div class="stat-trend up">
                            <i data-lucide="trending-up"></i>
                            <span>+2</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon week">
                            <i data-lucide="calendar"></i>
                        </div>
                        <div class="stat-content">
                            <span class="stat-value" id="weekCount">0</span>
                            <span class="stat-label">本周文章</span>
                        </div>
                        <div class="stat-trend up">
                            <i data-lucide="trending-up"></i>
                            <span>+12</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon total">
                            <i data-lucide="layers"></i>
                        </div>
                        <div class="stat-content">
                            <span class="stat-value" id="totalCount">0</span>
                            <span class="stat-label">文章总数</span>
                        </div>
                    </div>
                    
                    <div class="stat-card">
                        <div class="stat-icon views">
                            <i data-lucide="eye"></i>
                        </div>
                        <div class="stat-content">
                            <span class="stat-value">--</span>
                            <span class="stat-label">总阅读量</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 仪表板网格 -->
            <div class="dashboard-grid">
                <!-- 左侧：文章列表 -->
                <section class="dashboard-section articles-section">
                    <div class="section-header">
                        <h2 class="section-title">
                            <i data-lucide="file-text"></i>
                            <span>最近文章</span>
                        </h2>
                        <a href="articles.html" class="section-link">
                            <span>查看全部</span>
                            <i data-lucide="chevron-right"></i>
                        </a>
                    </div>
                    <div class="article-list" id="recentArticles">
                        <!-- 文章列表由 JS 动态加载 -->
                        <div class="loading-state">
                            <i data-lucide="loader-2" class="spin"></i>
                            <span>加载中...</span>
                        </div>
                    </div>
                </section>

                <!-- 右侧：快捷操作 + 待办 + 日历 -->
                <div class="dashboard-sidebar">
                    <!-- 快捷操作 -->
                    <section class="dashboard-section">
                        <div class="section-header">
                            <h2 class="section-title">
                                <i data-lucide="zap"></i>
                                <span>快捷操作</span>
                            </h2>
                        </div>
                        <div class="quick-actions-grid">
                            <a href="articles.html" class="quick-action-card">
                                <div class="quick-action-icon primary">
                                    <i data-lucide="file-plus"></i>
                                </div>
                                <span class="quick-action-label">新建文章</span>
                            </a>
                            <a href="materials.html" class="quick-action-card">
                                <div class="quick-action-icon secondary">
                                    <i data-lucide="image-plus"></i>
                                </div>
                                <span class="quick-action-label">上传素材</span>
                            </a>
                            <a href="todos.html" class="quick-action-card">
                                <div class="quick-action-icon success">
                                    <i data-lucide="check-circle"></i>
                                </div>
                                <span class="quick-action-label">添加待办</span>
                            </a>
                            <a href="calendar.html" class="quick-action-card">
                                <div class="quick-action-icon warning">
                                    <i data-lucide="calendar-plus"></i>
                                </div>
                                <span class="quick-action-label">发布排期</span>
                            </a>
                        </div>
                    </section>

                    <!-- 待办事项 -->
                    <section class="dashboard-section todo-preview">
                        <div class="section-header">
                            <h2 class="section-title">
                                <i data-lucide="check-square"></i>
                                <span>待办事项</span>
                            </h2>
                            <a href="todos.html" class="section-link">
                                <span>查看全部</span>
                                <i data-lucide="chevron-right"></i>
                            </a>
                        </div>
                        <div class="todo-list" id="todoList">
                            <div class="todo-item">
                                <label class="todo-checkbox">
                                    <input type="checkbox">
                                    <span class="checkmark"></span>
                                </label>
                                <span class="todo-text">完成今日上午文章创作</span>
                            </div>
                            <div class="todo-item">
                                <label class="todo-checkbox">
                                    <input type="checkbox">
                                    <span class="checkmark"></span>
                                </label>
                                <span class="todo-text">完成今日下午文章创作</span>
                            </div>
                            <div class="todo-item completed">
                                <label class="todo-checkbox">
                                    <input type="checkbox" checked>
                                    <span class="checkmark"></span>
                                </label>
                                <span class="todo-text">检查昨日文章数据</span>
                            </div>
                        </div>
                        <div class="todo-progress">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: 33%"></div>
                            </div>
                            <span class="progress-text">1/3 完成</span>
                        </div>
                    </section>

                    <!-- 日历预览 -->
                    <section class="dashboard-section calendar-preview">
                        <div class="section-header">
                            <h2 class="section-title">
                                <i data-lucide="calendar"></i>
                                <span>发布日历</span>
                            </h2>
                            <a href="calendar.html" class="section-link">
                                <span>查看全部</span>
                                <i data-lucide="chevron-right"></i>
                            </a>
                        </div>
                        <div class="mini-calendar">
                            <div class="calendar-header">
                                <button class="calendar-nav" id="prevMonth">
                                    <i data-lucide="chevron-left"></i>
                                </button>
                                <span class="calendar-month" id="calendarMonth">2026年3月</span>
                                <button class="calendar-nav" id="nextMonth">
                                    <i data-lucide="chevron-right"></i>
                                </button>
                            </div>
                            <div class="calendar-weekdays">
                                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                            </div>
                            <div class="calendar-days" id="calendarDays">
                                <!-- 由 JS 生成 -->
                            </div>
                        </div>
                        <div class="calendar-legend">
                            <div class="legend-item">
                                <span class="legend-dot today"></span>
                                <span>今天</span>
                            </div>
                            <div class="legend-item">
                                <span class="legend-dot event"></span>
                                <span>有发布</span>
                            </div>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <!-- 移动端遮罩 -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
    <script>
        // 初始化图标
        lucide.createIcons();
    </script>
</body>
</html>
