<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项 - OpenClaw</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="todos.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- 侧边导航栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i data-lucide="feather" class="logo-icon"></i>
                <span class="logo-text">OpenClaw</span>
            </div>
            <button class="sidebar-toggle" id="sidebarToggle">
                <i data-lucide="chevron-left"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="index.html" class="nav-link">
                        <i data-lucide="layout-dashboard"></i>
                        <span class="nav-text">工作台</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="articles.html" class="nav-link">
                        <i data-lucide="file-text"></i>
                        <span class="nav-text">文章管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="materials.html" class="nav-link">
                        <i data-lucide="image"></i>
                        <span class="nav-text">素材库</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="todos.html" class="nav-link">
                        <i data-lucide="check-square"></i>
                        <span class="nav-text">待办事项</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="calendar.html" class="nav-link">
                        <i data-lucide="calendar"></i>
                        <span class="nav-text">发布日历</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">
                    <span>K</span>
                </div>
                <div class="user-details">
                    <span class="user-name">Kimi Claw</span>
                    <span class="user-role">创作者</span>
                </div>
            </div>
            <button class="theme-toggle" id="themeToggle" title="切换主题">
                <i data-lucide="sun" class="theme-icon-light"></i>
                <i data-lucide="moon" class="theme-icon-dark"></i>
            </button>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部栏 -->
        <header class="top-bar">
            <div class="top-bar-left">
                <button class="mobile-menu-toggle" id="mobileMenuToggle">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="page-title">待办事项</h1>
            </div>
            <div class="top-bar-right">
                <button class="btn btn-primary btn-new" id="addTodoBtn">
                    <i data-lucide="plus"></i>
                    <span>新建待办</span>
                </button>
            </div>
        </header>

        <!-- 内容区域 -->
        <div class="content-wrapper">
            <!-- 统计栏 -->
            <section class="todos-stats">
                <div class="stats-row">
                    <div class="stat-item">
                        <i data-lucide="circle"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="pendingCount">0</span>
                            <span class="stat-label">待完成</span>
                        </div>
                    </div>
                    
                    <div class="stat-item">
                        <i data-lucide="check-circle"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="completedCount">0</span>
                            <span class="stat-label">已完成</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 待办列表 -->
            <section class="todos-section">
                <div class="todos-list" id="todosList">
                    <div class="loading-state">
                        <i data-lucide="loader-2" class="spin"></i>
                        <span>加载待办中...</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 移动端遮罩 -->
    <div class="mobile-overlay" id="mobileOverlay"></div>

    <!-- 新建待办弹窗 -->
    <div class="modal" id="addTodoModal">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建待办</h3>
                <button class="modal-close" id="closeAddModal">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>待办内容</label>
                    <input type="text" id="todoContent" placeholder="输入待办事项..." class="form-input">
                </div>
                <div class="form-group">
                    <label>优先级</label>
                    <div class="priority-options">
                        <label class="priority-option">
                            <input type="radio" name="priority" value="high">
                            <span class="priority-badge high">高</span>
                        </label>
                        <label class="priority-option">
                            <input type="radio" name="priority" value="medium" checked>
                            <span class="priority-badge medium">中</span>
                        </label>
                        <label class="priority-option">
                            <input type="radio" name="priority" value="low">
                            <span class="priority-badge low">低</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelAdd">取消</button>
                <button class="btn btn-primary" id="confirmAdd">添加</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
    <script src="todos.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
